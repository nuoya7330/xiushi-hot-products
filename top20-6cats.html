<script>
(function(){
  const NS = 'xiushi-top20-20260507';
  let vid = localStorage.getItem(NS+'_vid');
  if(!vid){
    vid = Date.now().toString(36) + Math.random().toString(36).slice(2,7);
    localStorage.setItem(NS+'_vid', vid);
  }
  const pv = parseInt(localStorage.getItem(NS+'_pv')||'0') + 1;
  localStorage.setItem(NS+'_pv', pv);

  let uvs = JSON.parse(localStorage.getItem(NS+'_uvs')||'[]');
  if(!uvs.includes(vid)){ uvs.push(vid); if(uvs.length>1000) uvs = uvs.slice(-1000); }
  localStorage.setItem(NS+'_uvs', JSON.stringify(uvs));

  function animate(el, target){
    let cur = 0;
    const step = Math.max(1, Math.floor(target/20));
    const timer = setInterval(()=>{
      cur += step;
      if(cur >= target){ cur = target; clearInterval(timer); }
      el.textContent = cur.toLocaleString();
    }, 30);
  }

  const pvEl = document.getElementById('pv-count');
  const uvEl = document.getElementById('uv-count');
  if(pvEl) animate(pvEl, pv);
  if(uvEl) animate(uvEl, uvs.length);
})();
</script>

function renderSection(idx) {
  const tab = TABS[idx];
  let html = '<div class="summary">';
  const cards = [
    {label:'类目 DGMV', val: tab.totDgmv, q: tab.totDgmvQ},
    {label:'商品笔记', val: tab.totNote, q: tab.totNoteQ},
    {label:'K播', val: tab.totK, q: tab.totKQ},
    {label:'店播', val: tab.totShop, q: tab.totShopQ},
  ];
  for(const c of cards){
    const qStr = c.q>0?`<span style="color:#e74c3c">环比 +${(c.q*100).toFixed(1)}%</span>`:`<span style="color:#27ae60">环比 ${(c.q*100).toFixed(1)}%</span>`;
    html+=`<div class="card"><div class="label">${c.label}</div><div class="val">${c.val}</div><div class="qoq">${qStr}</div></div>`;
  }
  html+='</div>';

  html+=`<div class="table-wrap"><table>
<thead>
<tr>
  <th rowspan="2" style="width:36px">排名</th>
  <th rowspan="2" style="min-width:90px">商家名称</th>
  <th rowspan="2" style="min-width:180px">商品名称</th>
  <th rowspan="2" style="min-width:66px">二级类目</th>
  <th colspan="2">DGMV</th>
  <th colspan="2">商品笔记</th>
  <th colspan="2">K播</th>
  <th colspan="2">店播</th>
</tr>
<tr>
  <th>金额</th><th>环比</th>
  <th>金额</th><th>环比</th>
  <th>金额</th><th>环比</th>
  <th>金额</th><th>环比</th>
</tr>
</thead><tbody>`;

  tab.rows.forEach((r,i)=>{
    const [merchant,itemId,product,cat,dgmv,dq,note,nq,k,kq,shop,sq] = r;
    const rank=i+1;
    let b;
    if(rank===1) b='<span class="medal medal-1">1</span>';
    else if(rank===2) b='<span class="medal medal-2">2</span>';
    else if(rank===3) b='<span class="medal medal-3">3</span>';
    else b='<span class="rank-num">'+rank+'</span>';

    html+=`<tr>
      <td class="rank-cell">${b}</td>
      <td class="merchant-cell"><span class="merchant-name" title="${merchant}">${merchant}</span></td>
      <td class="product-cell"><a class="product-link" href="https://www.xiaohongshu.com/goods-detail/${itemId}" target="_blank" title="${product}">${product}</a></td>
      <td class="cat-cell"><span class="cat-tag ${catClass(cat)}">${cat.split('/')[0]}</span></td>
      <td>${fmt(dgmv)}</td><td>${qoq(dq)}</td>
      <td>${fmt(note)}</td><td>${qoq(nq)}</td>
      <td>${fmt(k)}</td><td>${qoq(kq)}</td>
      <td>${fmt(shop)}</td><td>${qoq(sq)}</td>
    </tr>`;
  });
  html+='</tbody></table></div>';
  return html;
}

// 初始渲染
const container = document.getElementById('sections');
TABS.forEach((tab, idx)=>{
  const div = document.createElement('div');
  div.className = 'section' + (idx===0?' active':'');
  div.id = 'section-'+idx;
  div.innerHTML = renderSection(idx);
  container.appendChild(div);
});

function switchTab(idx) {
  document.querySelectorAll('.section').forEach((s,i)=>s.classList.toggle('active', i===idx));
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active', i===idx));
}
