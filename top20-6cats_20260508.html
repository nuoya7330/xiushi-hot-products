function catClass(cat) {
  const m = {"\u7cd5\u70b9": "c0", "\u997c\u5e72": "c1", "\u725b\u8089\u5e72": "c2", "\u871c\u996f": "c3", "\u5c71\u6838\u6843": "c4", "\u5de7\u514b\u529b": "c5", "\u5496\u5561": "c0", "\u6db2\u6001\u5976": "c4", "\u51b2\u996e": "c3", "\u4f4e\u6e29\u4e73": "c1", "\u9c9c\u98df\u996e": "c2", "\u5976\u916a": "c5", "\u996e\u6599": "c6", "\u65b9\u4fbf": "c2", "\u8c03\u5473": "c3", "\u7cbd\u5b50": "c0", "\u9762\u70b9": "c1", "\u5176\u4ed6\u98df\u54c1": "c4", "\u71d5\u7a9d": "c0", "\u9e7f\u8338": "c5", "\u836f\u98df\u540c\u6e90": "c2", "\u53c2\u7c7b": "c3", "\u8702\u871c": "c0", "\u517b\u751f\u8336": "c4", "\u98df\u7597": "c1", "\u6ecb\u8865": "c3", "\u5176\u4ed6\u8336": "c0", "\u666e\u6d31": "c3", "\u7eff\u8336": "c2", "\u7ea2\u8336": "c1", "\u9ed1\u8336": "c6", "\u4e4c\u9f99": "c4", "\u4ee3\u7528": "c5", "\u82b1\u8349": "c5", "\u8461\u8404\u9152": "c5", "\u6d0b\u9152": "c8", "\u5564\u9152": "c4", "\u767d\u9152": "c0"};
  for(const [k,v] of Object.entries(m)) { if(cat.startsWith(k)) return v; }
  return "c4";
}
function fmt(n) {
  if(!n||n===0) return '<span class="num-zero">—</span>';
  return '<span class="num">'+Math.round(n).toLocaleString('zh-CN')+'</span>';
}
function qoq(v) {
  if(v===null||v===undefined||v==='') return '<span class="qoq-zero">新品</span>';
  const pct=(v*100).toFixed(1);
  if(v>0) return '<span class="qoq-pos">+'+pct+'%</span>';
  if(v<0) return '<span class="qoq-neg">'+pct+'%</span>';
  return '<span class="qoq-zero">持平</span>';
}
function badge(i){
  if(i===1) return '<span class="medal medal-1">1</span>';
  if(i===2) return '<span class="medal medal-2">2</span>';
  if(i===3) return '<span class="medal medal-3">3</span>';
  return '<span class="rank-num">'+i+'</span>';
}

function renderSection(idx) {
  const tab = TABS[idx];
  let html = '<div class="summary">';
  const cards = [
    {label:'类目 DGMV', val: tab.totDgmv, q: tab.totDgmvQ},
    {label:'商品笔记', val: tab.totNote, q: tab.totNoteQ},
    {label:'K播', val: tab.totK, q: tab.totKQ},
    {label:'店播', val: tab.totShop, q: tab.totShopQ},
  ];
  for(const c of cards){
    let qStr;
    if(c.q===null||c.q===undefined) qStr='<span style="color:#bbb">环比 —</span>';
    else if(c.q>0) qStr=`<span style="color:#e74c3c">环比 +${(c.q*100).toFixed(1)}%</span>`;
    else if(c.q<0) qStr=`<span style="color:#27ae60">环比 ${(c.q*100).toFixed(1)}%</span>`;
    else qStr='<span style="color:#bbb">环比 0.0%</span>';
    html+=`<div class="card"><div class="label">${c.label}</div><div class="val">${c.val}</div><div class="qoq">${qStr}</div></div>`;
  }
  html+='</div>';
  html+=`<div class="table-wrap"><table>
<thead><tr>
  <th rowspan="2" style="width:36px">排名</th>
  <th rowspan="2" style="min-width:90px">商家名称</th>
  <th rowspan="2" style="min-width:180px">商品名称</th>
  <th rowspan="2" style="min-width:66px">二级类目</th>
  <th colspan="2">DGMV</th><th colspan="2">商品笔记</th>
  <th colspan="2">K播</th><th colspan="2">店播</th>
</tr><tr>
  <th>金额</th><th>环比</th><th>金额</th><th>环比</th>
  <th>金额</th><th>环比</th><th>金额</th><th>环比</th>
</tr></thead><tbody>`;
  tab.rows.forEach((r,i)=>{
    const [merchant,itemId,product,cat,dgmv,dq,note,nq,k,kq,shop,sq]=r;
    const rank=i+1;
    let b;
    if(rank===1) b='<span class="medal medal-1">1</span>';
    else if(rank===2) b='<span class="medal medal-2">2</span>';
    else if(rank===3) b='<span class="medal medal-3">3</span>';
    else b='<span class="rank-num">'+rank+'</span>';
    html+=`<tr>
      <td class="rank-cell">${b}</td>
      <td class="merchant-cell"><span class="merchant-name" title="${merchant}">${merchant}</span></td>
      <td class="product-cell"><a class="product-link" href="https://www.xiaohongshu.com/goods-detail/${itemId}" target="_blank" title="${product}">${product}</a></td>
      <td class="cat-cell"><span class="cat-tag ${catClass(cat)}">${cat.split('/')[0]}</span></td>
      <td>${fmt(dgmv)}</td><td>${qoq(dq)}</td>
      <td>${fmt(note)}</td><td>${qoq(nq)}</td>
      <td>${fmt(k)}</td><td>${qoq(kq)}</td>
      <td>${fmt(shop)}</td><td>${qoq(sq)}</td>
    </tr>`;
  });
  html+='</tbody></table></div>';
  return html;
}

const container = document.getElementById('sections');
TABS.forEach((tab, idx)=>{
  const div = document.createElement('div');
  div.className = 'section' + (idx===0?' active':'');
  div.id = 'section-'+idx;
  div.innerHTML = renderSection(idx);
  container.appendChild(div);
});

function switchTab(idx) {
  document.querySelectorAll('.section').forEach((s,i)=>s.classList.toggle('active', i===idx));
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active', i===idx));
}

// 浏览次数/人数统计
(function(){
  const NS='xiushi-top20-daily';
  let vid=localStorage.getItem(NS+'_vid');
  if(!vid){vid=Date.now().toString(36)+Math.random().toString(36).slice(2,7);localStorage.setItem(NS+'_vid',vid);}
  const pv=parseInt(localStorage.getItem(NS+'_pv')||'0')+1;
  localStorage.setItem(NS+'_pv',pv);
  let uvs=JSON.parse(localStorage.getItem(NS+'_uvs')||'[]');
  if(!uvs.includes(vid)){uvs.push(vid);if(uvs.length>1000)uvs=uvs.slice(-1000);}
  localStorage.setItem(NS+'_uvs',JSON.stringify(uvs));
  function animate(el,t){let c=0;const s=Math.max(1,Math.floor(t/20));const ti=setInterval(()=>{c+=s;if(c>=t){c=t;clearInterval(ti);}el.textContent=c.toLocaleString();},30);}
  const pvEl=document.getElementById('pv-count');
  const uvEl=document.getElementById('uv-count');
  if(pvEl)animate(pvEl,pv);
  if(uvEl)animate(uvEl,uvs.length);
})();
</script>
